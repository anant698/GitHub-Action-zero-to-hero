name: Hello
on:
  push:
    branches: [main]

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
       - name: say hello to user
         run: echo "Hello dosto"

       - name: say hello to username
         run: echo "Hello $USER"
  details:
    runs-on: ubuntu-latest
    steps:
      - name: what is the version of python, docker, etc
        run: docker --version && python --version
